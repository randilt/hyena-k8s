syntax = "proto3";

package secretmanager.v1;

option go_package = "hyena-k8s/proto/secretmanager/v1";

// SecretManagerService handles storing and distributing secrets
service SecretManagerService {
  // StoreSecret splits a secret and distributes shares to share servers
  rpc StoreSecret(StoreSecretRequest) returns (StoreSecretResponse);
  
  // ListSecrets lists all stored secret names
  rpc ListSecrets(ListSecretsRequest) returns (ListSecretsResponse);
  
  // DeleteSecret removes a secret from all share servers
  rpc DeleteSecret(DeleteSecretRequest) returns (DeleteSecretResponse);
}

message StoreSecretRequest {
  // Name identifier for this secret
  string secret_name = 1;
  
  // The actual secret data to split and store
  bytes secret_data = 2;
  
  // Number of shares to create (N)
  int32 total_shares = 3;
  
  // Minimum shares needed to reconstruct (K)
  int32 threshold = 4;
}

message StoreSecretResponse {
  bool success = 1;
  string message = 2;
  
  // IDs of share servers that received shares
  repeated string share_server_ids = 3;
}

message ListSecretsRequest {}

message ListSecretsResponse {
  repeated string secret_names = 1;
}

message DeleteSecretRequest {
  string secret_name = 1;
}

message DeleteSecretResponse {
  bool success = 1;
  string message = 2;
}
