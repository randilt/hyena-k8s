{{- if .Values.secretManager.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hyena.fullname" . }}-secret-manager
  labels:
    {{- include "hyena.labels" . | nindent 4 }}
    app.kubernetes.io/component: secret-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "hyena.secretManager.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "hyena.secretManager.selectorLabels" . | nindent 8 }}
    spec:
      containers:
      - name: secret-manager
        image: "{{ .Values.secretManager.image.repository }}:{{ .Values.secretManager.image.tag }}"
        imagePullPolicy: {{ .Values.secretManager.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.secretManager.port }}
          protocol: TCP
        - name: grpc
          containerPort: {{ .Values.secretManager.grpcPort }}
          protocol: TCP
        env:
        - name: PORT
          value: "{{ .Values.secretManager.port }}"
        - name: GRPC_PORT
          value: "{{ .Values.secretManager.grpcPort }}"
        - name: DEFAULT_N
          value: "{{ .Values.shareServer.replicaCount }}"
        - name: DEFAULT_K
          value: "{{ .Values.shareServer.threshold }}"
        - name: SHARE_SERVER_ENDPOINTS
          value: "{{ range $i := until (int .Values.shareServer.replicaCount) }}{{ if $i }},{{ end }}{{ include "hyena.fullname" $ }}-share-server-{{ $i }}.{{ include "hyena.fullname" $ }}-share-server.{{ $.Release.Namespace }}.svc.cluster.local:{{ $.Values.shareServer.port }}{{ end }}"
        resources:
          {{- toYaml .Values.secretManager.resources | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
{{- end }}
