apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "hyena.fullname" . }}-share-server
  labels:
    {{- include "hyena.labels" . | nindent 4 }}
    app.kubernetes.io/component: share-server
spec:
  serviceName: {{ include "hyena.fullname" . }}-share-server
  replicas: {{ .Values.shareServer.replicaCount }}
  selector:
    matchLabels:
      {{- include "hyena.shareServer.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "hyena.shareServer.selectorLabels" . | nindent 8 }}
    spec:
      initContainers:
      - name: load-share
        image: busybox:latest
        command:
        - sh
        - -c
        - |
          ORDINAL=${HOSTNAME##*-}
          cp /share-secrets/share-${ORDINAL}.bin /secrets/share.bin
        volumeMounts:
        - name: share-secrets
          mountPath: /share-secrets
          readOnly: true
        - name: share-data
          mountPath: /secrets
      containers:
      - name: share-server
        image: "{{ .Values.shareServer.image.repository }}:{{ .Values.shareServer.image.tag }}"
        imagePullPolicy: {{ .Values.shareServer.image.pullPolicy }}
        ports:
        - name: grpc
          containerPort: {{ .Values.shareServer.port }}
          protocol: TCP
        env:
        - name: SERVER_ID
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: PORT
          value: "{{ .Values.shareServer.port }}"
        - name: SHARE_FILE
          value: "/secrets/share.bin"
        - name: ALLOWED_CALLERS
          value: "{{ .Release.Namespace }}:{{ include "hyena.serviceAccountName" . }}"
        - name: DEV_MODE
          value: "{{ .Values.shareServer.devMode }}"
        - name: TLS_ENABLED
          value: "{{ .Values.shareServer.tls.enabled }}"
        volumeMounts:
        - name: share-data
          mountPath: /secrets
          readOnly: true
        resources:
          {{- toYaml .Values.shareServer.resources | nindent 10 }}
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - "true"
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - "true"
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: share-secrets
        secret:
          secretName: {{ include "hyena.fullname" . }}-shares
      - name: share-data
        emptyDir: {}
