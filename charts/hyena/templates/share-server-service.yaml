apiVersion: v1
kind: Service
metadata:
  name: {{ include "hyena.fullname" . }}-share-server
  labels:
    {{- include "hyena.labels" . | nindent 4 }}
    app.kubernetes.io/component: share-server
spec:
  clusterIP: None  # Headless service
  ports:
    - port: {{ .Values.shareServer.port }}
      targetPort: grpc
      protocol: TCP
      name: grpc
  selector:
    {{- include "hyena.shareServer.selectorLabels" . | nindent 4 }}
